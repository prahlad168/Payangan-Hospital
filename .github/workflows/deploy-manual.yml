name: Deploy to Hosting

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy via Webhook
        run: |
          # Trigger webhook on hosting
          curl -X POST "https://payanganhospital.gianyarkab.go.id/webhook.php" \
            -H "Content-Type: application/json" \
            -d '{"ref": "refs/heads/main", "commits": [{"message": "${{ github.event.head_commit.message }}"}]}'
          
      - name: Wait for deploy
        run: sleep 10
      
      - name: Verify deployment
        run: |
          # Check if latest files exist on hosting
          curl -s --max-time 15 "https://payanganhospital.gianyarkab.go.id/index.html" | head -5
