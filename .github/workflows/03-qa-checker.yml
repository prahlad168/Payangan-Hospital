name: ✅ Auto QA Checker

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [synchronize, opened, reopened]
  
  # Manual trigger
  workflow_dispatch:

jobs:
  qa-checker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 html5validator

      - name: Run QA Checker Agent
        id: qa
        run: |
          python << 'EOF'
          import os
          import re
          from pathlib import Path
          from datetime import datetime
          
          print("✅ MEMULAI QA CHECKER AGENT")
          print("=" * 60)
          
          # Get branch info
          branch = os.getenv('GITHUB_REF_NAME', 'unknown')
          commit = os.getenv('GITHUB_SHA', 'unknown')[:8]
          print(f"🌿 Branch: {branch}")
          print(f"📜 Commit: {commit}")
          print()
          
          # Get changed files
          result = os.popen('git diff --name-only HEAD~1 HEAD 2>/dev/null || echo ""').read().strip()
          if not result:
              result = os.popen('git status --porcelain 2>/dev/null || ls *.html').read().strip()
          
          changed_files = [f for f in result.split('\n') if f.strip() and (f.endswith('.html') or f.endswith('.css') or f.endswith('.js'))]
          
          if not changed_files:
              changed_files = [f.name for f in Path('.').glob('*.html')]
          
          print(f"📁 Files to check: {len(changed_files)}")
          print()
          
          results = {
              'html_validation': [],
              'accessibility': [],
              'seo': [],
              'performance': [],
              'best_practices': []
          }
          
          for filename in changed_files:
              if not Path(filename).exists() or not filename.endswith('.html'):
                  continue
              
              content = Path(filename).read_text(encoding='utf-8')
              file_issues = []
              
              # ===== HTML VALIDATION =====
              
              # Check 1: DOCTYPE
              if not re.search(r'<!DOCTYPE\s+html>', content, re.I):
                  file_issues.append({
                      'category': 'HTML',
                      'severity': 'error',
                      'message': 'Missing DOCTYPE declaration'
                  })
              
              # Check 2: Lang attribute
              if 'lang="id"' not in content and '<html' in content:
                  pass  # lang="id" is fine
              elif '<html' in content and 'lang=' not in content:
                  file_issues.append({
                      'category': 'HTML',
                      'severity': 'warning',
                      'message': 'Missing lang attribute on <html>'
                  })
              
              # Check 3: Meta charset
              if '<meta charset' not in content and '<meta charset=' not in content.lower():
                  file_issues.append({
                      'category': 'HTML',
                      'severity': 'error',
                      'message': 'Missing charset meta tag'
                  })
              
              # Check 4: Viewport meta
              if 'viewport' not in content.lower():
                  file_issues.append({
                      'category': 'HTML',
                      'severity': 'error',
                      'message': 'Missing viewport meta tag for responsive design'
                  })
              
              # Check 5: Closed tags
              unclosed = []
              for tag in ['div', 'section', 'header', 'footer', 'nav', 'main', 'article', 'aside']:
                  opens = len(re.findall(rf'<{tag}[^>]*>', content, re.I))
                  closes = len(re.findall(rf'</{tag}>', content, re.I))
                  if opens != closes:
                      file_issues.append({
                          'category': 'HTML',
                          'severity': 'error',
                          'message': f'Unclosed <{tag}> tags (open: {opens}, close: {closes})'
                      })
              
              # ===== ACCESSIBILITY =====
              
              # Check 6: Alt text on images
              img_tags = re.findall(r'<img[^>]+>', content, re.I)
              for img in img_tags:
                  if 'alt=' not in img.lower():
                      file_issues.append({
                          'category': 'A11Y',
                          'severity': 'warning',
                          'message': 'Image missing alt attribute'
                      })
              
              # Check 7: Heading hierarchy
              h1_count = len(re.findall(r'<h1[^>]*>', content, re.I))
              if h1_count > 1:
                  file_issues.append({
                      'category': 'A11Y',
                      'severity': 'warning',
                      'message': f'Multiple <h1> tags found ({h1_count}). Should have only one.'
                  })
              
              # Check 8: Form labels
              inputs = re.findall(r'<input[^>]+>', content, re.I)
              for inp in inputs:
                  if 'type="hidden"' not in inp:
                      if 'id=' in inp and 'aria-label=' not in inp and 'placeholder=' not in inp:
                          if not re.search(r'<label[^>]+for=["\']' + re.escape(inp.split('id=')[1].split('"')[0] if 'id=' in inp else '') + r'["\']', content, re.I):
                              pass  # Skip complex check
              
              # ===== SEO =====
              
              # Check 9: Meta description
              if 'meta name="description"' not in content.lower():
                  file_issues.append({
                      'category': 'SEO',
                      'severity': 'warning',
                      'message': 'Missing meta description'
                  })
              
              # Check 10: Title tag
              if '<title>' not in content and '</title>' not in content:
                  file_issues.append({
                      'category': 'SEO',
                      'severity': 'error',
                      'message': 'Missing <title> tag'
                  })
              
              # ===== PERFORMANCE =====
              
              # Check 11: Inline styles
              inline_styles = len(re.findall(r'style="', content))
              if inline_styles > 20:
                  file_issues.append({
                      'category': 'PERF',
                      'severity': 'warning',
                      'message': f'Many inline styles ({inline_styles}). Consider CSS classes.'
                  })
              
              # Check 12: External resources
              scripts = re.findall(r'<script[^>]+src="([^"]+)"', content)
              for script in scripts:
                  if 'cdn' in script.lower():
                      file_issues.append({
                          'category': 'PERF',
                          'severity': 'info',
                          'message': f'External script: {script[:50]}...'
                      })
              
              # Check 13: Image optimization hints
              imgs = re.findall(r'<img[^>]+>', content)
              for img in imgs:
                  if 'loading=' not in img.lower() and 'src=' in img:
                      file_issues.append({
                          'category': 'PERF',
                          'severity': 'info',
                          'message': 'Consider adding loading="lazy" to images'
                      })
              
              # ===== BEST PRACTICES =====
              
              # Check 14: Button vs Link
              buttons = len(re.findall(r'<button', content, re.I))
              links_to_js = len(re.findall(r'<a[^>]+onclick=', content, re.I))
              if links_to_js > buttons:
                  file_issues.append({
                      'category': 'BEST',
                      'severity': 'info',
                      'message': f'{links_to_js} links with onclick handlers. Consider using <button>.'
                  })
              
              # Check 15: Semantic HTML
              if '<div class="nav"' in content.lower() or '<div class="header"' in content.lower():
                  file_issues.append({
                      'category': 'BEST',
                      'severity': 'info',
                      'message': 'Consider using semantic tags: <nav>, <header> instead of div'
                  })
              
              # Add file issues to results
              results['html_validation'].extend([i for i in file_issues if i['category'] == 'HTML'])
              results['accessibility'].extend([i for i in file_issues if i['category'] == 'A11Y'])
              results['seo'].extend([i for i in file_issues if i['category'] == 'SEO'])
              results['performance'].extend([i for i in file_issues if i['category'] == 'PERF'])
              results['best_practices'].extend([i for i in file_issues if i['category'] == 'BEST'])
          
          # Generate Report
          print("\n" + "=" * 60)
          print("📊 QA CHECKER REPORT")
          print("=" * 60)
          
          total_errors = len([r for r in results.values() for x in r if x['severity'] == 'error'])
          total_warnings = len([r for r in results.values() for x in r if x['severity'] == 'warning'])
          total_info = len([r for r in results.values() for x in r if x['severity'] == 'info'])
          
          print(f"\n📈 Summary:")
          print(f"   ❌ Errors: {total_errors}")
          print(f"   ⚠️ Warnings: {total_warnings}")
          print(f"   ℹ️ Info: {total_info}")
          
          # Group by category
          for category, items in results.items():
              if items:
                  cat_name = {
                      'html_validation': '📝 HTML Validation',
                      'accessibility': '♿ Accessibility',
                      'seo': '🔍 SEO',
                      'performance': '⚡ Performance',
                      'best_practices': '✨ Best Practices'
                  }.get(category, category)
                  
                  print(f"\n{cat_name}:")
                  errors = [i for i in items if i['severity'] == 'error']
                  warnings = [i for i in items if i['severity'] == 'warning']
                  
                  for item in errors[:5]:
                      print(f"   ❌ {item['message']}")
                  for item in warnings[:5]:
                      print(f"   ⚠️ {item['message']}")
          
          print("\n" + "=" * 60)
          if total_errors == 0:
              print("✅✅✅ QA CHECK PASSED!")
          else:
              print(f"⚠️⚠️⚠️ QA FAILED - {total_errors} errors found")
          print("=" * 60)
          
          # Generate markdown report
          with open('qa_report.md', 'w') as f:
              f.write(f"# ✅ QA Checker Report\n\n")
              f.write(f"**Branch:** `{branch}`\n")
              f.write(f"**Commit:** `{commit}`\n")
              f.write(f"**Timestamp:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')} UTC\n\n")
              
              f.write(f"## 📊 Summary\n\n")
              f.write(f"| Type | Count |\n")
              f.write(f"|------|-------|\n")
              f.write(f"| ❌ Errors | {total_errors} |\n")
              f.write(f"| ⚠️ Warnings | {total_warnings} |\n")
              f.write(f"| ℹ️ Info | {total_info} |\n\n")
              
              for category, items in results.items():
                  if items:
                      cat_name = {
                          'html_validation': '📝 HTML Validation',
                          'accessibility': '♿ Accessibility',
                          'seo': '🔍 SEO',
                          'performance': '⚡ Performance',
                          'best_practices': '✨ Best Practices'
                      }.get(category, category)
                      
                      f.write(f"## {cat_name}\n\n")
                      f.write("| File | Severity | Message |\n")
                      f.write("|------|----------|--------|\n")
                      
                      for item in items[:20]:
                          f.write(f"| - | {item['severity'].upper()} | {item['message']} |\n")
                      f.write("\n")
              
              if total_errors == 0:
                  f.write("✅ **QA Status:** PASSED\n")
              else:
                  f.write(f"❌ **QA Status:** FAILED - {total_errors} errors\n")
          
          # Set outputs
          with open(os.getenv('GITHUB_OUTPUT', '/dev/stdout'), 'a') as f:
              f.write(f"errors={total_errors}\n")
              f.write(f"warnings={total_warnings}\n")
              f.write(f"status={'pass' if total_errors == 0 else 'fail'}\n")
          
          if total_errors > 0:
              exit(1)
          
          EOF

      - name: Post QA Report Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('qa_report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa_report.md
          retention-days: 30
