<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&amp;display=swap');
      .logo-text {
        font-family: 'Montserrat', sans-serif;
      }
      .logo-name {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.08em;
        fill: #0891b2;
      }
      .logo-tagline {
        font-weight: 300;
        font-size: 9px;
        letter-spacing: 0.25em;
        fill: #64748b;
      }
      .logo-icon {
        fill: #0891b2;
      }
    </style>
  </defs>
  
  <!-- Hospital Icon - Medical Cross -->
  <g transform="translate(5, 10)">
    <!-- Cross shape -->
    <rect x="12" y="0" width="16" height="40" rx="2" class="logo-icon"/>
    <rect x="0" y="12" width="40" height="16" rx="2" class="logo-icon"/>
    <!-- Inner circle for medical symbol -->
    <circle cx="20" cy="20" r="8" fill="#ffffff"/>
    <rect x="17" y="8" width="6" height="24" rx="1" fill="#ffffff"/>
    <rect x="8" y="17" width="24" height="6" rx="1" fill="#ffffff"/>
  </g>
  
  <!-- Text: PAYANGAN HOSPITAL -->
  <text x="55" y="32" class="logo-text logo-name">PAYANGAN HOSPITAL</text>
  
  <!-- Text: PAVITRAM IDAM UTTAMAM -->
  <text x="55" y="48" class="logo-text logo-tagline">PAVITRAM IDAM UTTAMAM</text>
</svg>
